name: update-pricing

on:
  schedule:
    - cron: "0 21 * * *" # JST 06:00 毎日
  workflow_dispatch:

permissions:
  contents: write

env:
  # 取得対象リージョン (スペース区切りで追加可能)
  REGIONS: ap-northeast-1 us-east-1

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch offer files
        run: |
          set -euo pipefail
          for region in $REGIONS; do
            url="https://pricing.us-east-1.amazonaws.com/offers/v1.0/aws/AmazonBedrock/current/${region}/index.json"
            echo "fetch: $url"
            curl -fsSL --retry 3 "$url" -o "offer-${region}.json"
          done

      - name: Transform
        run: |
          set -euo pipefail
          node scripts/transform.mjs offer-*.json > docs/data.json

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "chore: update pricing $(date -u +%F)"
            git push
          fi
