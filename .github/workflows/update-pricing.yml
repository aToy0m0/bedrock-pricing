name: update-pricing

on:
  schedule:
    - cron: "0 21 */2 * *" # JST 06:00 / 2 日に 1 回（UTC 21:00 = 翌 JST 06:00）
  workflow_dispatch:

permissions:
  contents: write

env:
  # GovCloud（政府専用）は一般契約者が使えないため対象外にする
  EXCLUDE_REGION_REGEX: "^us-gov-"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Fetch offer files
        run: |
          set -euo pipefail
          # Bedrock の料金は 2 つのオファーに分かれている:
          #   AmazonBedrock                : 旧 Claude・Amazon Nova・サードパーティ
          #   AmazonBedrockFoundationModels: 新しい Claude（Opus 4.x / Sonnet 5 等）を含む
          base="https://pricing.us-east-1.amazonaws.com/offers/v1.0/aws"

          # 両オファーの region_index から対象リージョンの和集合を動的に得る
          # （固定リストを持たず、AWS 側のリージョン追加に自動追従する）
          curl -fsSL --retry 3 "${base}/AmazonBedrock/current/region_index.json" -o ri-legacy.json
          curl -fsSL --retry 3 "${base}/AmazonBedrockFoundationModels/current/region_index.json" -o ri-fm.json
          regions=$(node -e '
            const a = require("./ri-legacy.json").regions, b = require("./ri-fm.json").regions;
            const ex = new RegExp(process.env.EXCLUDE_REGION_REGEX);
            const all = [...new Set([...Object.keys(a), ...Object.keys(b)])]
              .filter((r) => !ex.test(r)).sort();
            console.log(all.join(" "));
          ')
          echo "対象リージョン: $regions"

          for region in $regions; do
            # AmazonBedrock（旧オファー）
            if curl -fsSL --retry 3 "${base}/AmazonBedrock/current/${region}/index.json" -o "offer-${region}.json"; then
              echo "ok: offer-${region}.json"
            else
              echo "warn: AmazonBedrock offer not available for ${region} (skip)"
              rm -f "offer-${region}.json"
            fi

            # AmazonBedrockFoundationModels（新オファー）
            if curl -fsSL --retry 3 "${base}/AmazonBedrockFoundationModels/current/${region}/index.json" -o "offer-fm-${region}.json"; then
              echo "ok: offer-fm-${region}.json"
            else
              echo "warn: FoundationModels offer not available for ${region} (skip)"
              rm -f "offer-fm-${region}.json"
            fi
          done

      - name: Transform
        run: |
          set -euo pipefail
          node scripts/transform.mjs offer-*.json > docs/data.json

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "chore: update pricing $(date -u +%F)"
            git push
          fi
