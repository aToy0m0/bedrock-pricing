name: update-pricing

on:
  schedule:
    - cron: "0 21 * * *" # JST 06:00 毎日
  workflow_dispatch:

permissions:
  contents: write

env:
  # 取得対象リージョン (スペース区切りで追加可能)
  REGIONS: ap-northeast-1 us-east-1

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Fetch offer files
        run: |
          set -euo pipefail
          # Bedrock の料金は 2 つのオファーに分かれている:
          #   AmazonBedrock                : 旧 Claude・Amazon Nova・サードパーティ
          #   AmazonBedrockFoundationModels: 新しい Claude（Opus 4.x / Sonnet 5 等）を含む
          base="https://pricing.us-east-1.amazonaws.com/offers/v1.0/aws"
          for region in $REGIONS; do
            url="${base}/AmazonBedrock/current/${region}/index.json"
            echo "fetch: $url"
            curl -fsSL --retry 3 "$url" -o "offer-${region}.json"

            # FoundationModels は一部リージョンで未提供のこともあるため 404 は警告に留める
            fmurl="${base}/AmazonBedrockFoundationModels/current/${region}/index.json"
            echo "fetch: $fmurl"
            if curl -fsSL --retry 3 "$fmurl" -o "offer-fm-${region}.json"; then
              echo "  ok: offer-fm-${region}.json"
            else
              echo "  warn: FoundationModels offer not available for ${region} (skip)"
              rm -f "offer-fm-${region}.json"
            fi
          done

      - name: Transform
        run: |
          set -euo pipefail
          node scripts/transform.mjs offer-*.json > docs/data.json

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "chore: update pricing $(date -u +%F)"
            git push
          fi
